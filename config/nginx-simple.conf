worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            allow publish all;
            allow play all;
            
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_cleanup on;

            dash on;
            dash_path /tmp/dash;
            dash_fragment 2s;
            dash_playlist_length 10s;
            dash_cleanup on;
        }
    }
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) { return 204; }

        # 3️⃣ HLS
        location /hls {
            types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; }
            alias /tmp/hls;
            add_header Cache-Control no-cache;
        }

        # 4️⃣ DASH
        location /dash {
            types { application/dash+xml mpd; video/mp4 mp4; }
            alias /tmp/dash;
            add_header Cache-Control no-cache;
        }

        # 5️⃣ Stats
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # 6️⃣ Health check
        location /health {
            return 200 "ok\n";
        }
    }
}