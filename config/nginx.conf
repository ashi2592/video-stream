worker_processes auto;
rtmp_auto_push on;

events {}

rtmp {
    server {
        listen 1935;              # RTMP port (standard)
        chunk_size 4096;
        
        application live {
            live on;              # Enable live streaming
            record off;           # Don't record streams to disk
            
            # HLS (HTTP Live Streaming) conversion
            hls on;
            hls_path /tmp/hls;    # Store HLS segments here
            hls_fragment 2s;      # 2-second segments
            hls_playlist_length 10s;  # Keep last 10 seconds in playlist
            hls_cleanup on;       # Remove old segments
        }
    }
}


http {
    server {
        listen 8080;              # HTTP server on port 8080
        
        # Serves HLS streams at /live
        location /live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin * always;
        }
        
        # RTMP statistics endpoint
        location /stat {
            rtmp_stat all;
        }
        
        # Health check endpoint
        location /health {
            return 200 "ok\n";
        }
        
        # Alternative HLS endpoint
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin * always;
        }
    }
}