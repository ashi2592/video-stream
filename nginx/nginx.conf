# nginx.conf — HTTP + RTMP ingest server
# Requires: nginx with nginx-rtmp-module (e.g. tiangolo/nginx-rtmp Docker image)

worker_processes auto;
events {
    worker_connections 1024;
}

# ── RTMP block ──────────────────────────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;   # Set to 'all' to archive streams to disk

            # On stream publish: FFmpeg converts RTMP → HLS segments in real-time
            # Latency target: ~2 seconds (hls_time 2)
            exec ffmpeg -i rtmp://localhost/live/$name
                -c:v libx264
                -preset veryfast
                -tune zerolatency
                -b:v 2000k
                -maxrate 2500k
                -bufsize 4000k
                -c:a aac
                -ar 44100
                -b:a 128k
                -f hls
                -hls_time 2
                -hls_list_size 10
                -hls_flags delete_segments+append_list+omit_endlist
                -hls_segment_filename /tmp/hls/$name-%03d.ts
                /tmp/hls/$name.m3u8;

            # Notify backend when stream starts/stops
            on_publish  http://fastapi:8000/stream/start;
            on_done     http://fastapi:8000/stream/end;
        }
    }
}

# ── HTTP block ──────────────────────────────────────────────────────────────
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;

        # HLS live segments (served directly from disk)
        location /hls {
            types {
                application/vnd.apple.mpegurl  m3u8;
                video/mp2t                     ts;
            }
            root /tmp;

            # No caching for live playlists
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Headers *;
        }

        # RTMP stats dashboard (optional, remove in production)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        # Proxy all other requests to FastAPI
        location / {
            proxy_pass         http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection keep-alive;
            proxy_set_header   Host       $host;
            proxy_cache_bypass $http_upgrade;

            # Allow large video uploads (up to 4 GB)
            client_max_body_size 4096m;
            proxy_read_timeout   600s;
            proxy_send_timeout   600s;
        }
    }
}
